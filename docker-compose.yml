services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bassuurmond-app
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_UMAMI_URL=https://analytics.campcraftbuilders.nl
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=dd28f787-e68e-414f-9ae5-f24c40893868
    ports:
      # HAProxy on opnsense routes bassuurmond.nl -> 192.168.1.232:3007
      - "3007:3007"
    networks:
      - bassuurmond-network
    mem_limit: 256m
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3007', (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bassuurmond-network:
    driver: bridge
